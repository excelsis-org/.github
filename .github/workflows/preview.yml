name: Preview

on:
  workflow_call:
    inputs:
      pulumi-org:
        description: Pulumi organization name
        type: string
        required: true
      bun-version:
        description: Bun version
        type: string
        default: "1.2.15"
    secrets:
      PULUMI_ACCESS_TOKEN:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview-web:
    name: Deploy Web Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          pulumi-org: ${{ inputs.pulumi-org }}
          aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          env-slug: dev
          bun-version: ${{ inputs.bun-version }}

      - name: Build web
        env:
          BUILD_HASH: ${{ github.sha }}
        run: bun run --cwd apps/web build

      - name: Deploy to Cloudflare Pages
        id: cf-pages
        run: |
          deploy_url=$(bunx wrangler@4 pages deploy ./apps/web/dist/client \
            --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }} \
            --branch=pr-${{ github.event.pull_request.number }} \
            2>&1 | grep -oE 'https://[a-z0-9-]+\.pages\.dev' | tail -1)
          echo "url=${deploy_url}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.cf-pages.outputs.url }}';
            const body = `## Web Preview\n\n🚀 **[${url}](${url})**\n\n_Deployed from \`${{ github.head_ref }}\` · ${{ github.sha }}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('## Web Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
